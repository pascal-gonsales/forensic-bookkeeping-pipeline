name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pdfplumber
      - name: Run parser smoke test
        run: python test_parsers.py
      - name: Run synthetic safety tests (no fixtures needed)
        run: python tests/synthetic/test_validator_safety.py
